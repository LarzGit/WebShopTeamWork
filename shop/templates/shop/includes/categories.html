{% load static %}
<section class="top-categories-section">
    <div class="container">
        <div class="section-heading">
            <h2>Покупки за <span>категоріями</span></h2>
            <a href="{% url 'catalog' %}">Всі категорії ›</a>
        </div>

        <div class="top-categories-grid">
            {% for category in categories %}
            <a href="{% url 'catalog' %}?category={{ category.id|default:'' }}" class="top-category-card">
                <div class="category-circle {% if category.active %}active{% endif %}">
                    <img src="{% static category.image %}" alt="{{ category.name }}">
                </div>
                <p>{{ category.name }}</p>
            </a>
            {% endfor %}
        </div>
    </div>
</section>
