{% load static %}
<section class="top-categories-section">
    <div class="container">
        <div class="section-heading">
            <h2>Shop From <span>Top Categories</span></h2>
            <a href="#">View All ›</a>
        </div>

        <div class="top-categories-grid">
            {% for category in categories %}
            <div class="top-category-card">
                <div class="category-circle {% if category.active %}active{% endif %}">
                    <img src="{% static category.image %}" alt="{{ category.name }}">
                </div>
                <p>{{ category.name }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
