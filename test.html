<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Тест API</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 40px auto;
        }

        input,
        select {
            display: block;
            margin: 8px 0;
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            padding: 8px 16px;
            margin-top: 8px;
            cursor: pointer;
        }

        pre {
            background: #f0f0f0;
            padding: 10px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        hr {
            margin: 30px 0;
        }
    </style>
</head>

<body>

    <h2>Реєстрація</h2>
    <input id="reg-username" placeholder="Username">
    <input id="reg-email" placeholder="Email">
    <input id="reg-password" type="password" placeholder="Password">
    <input id="reg-password2" type="password" placeholder="Confirm Password">
    <button onclick="register()">register</button>

    <h2>Вхід</h2>
    <input id="login-username" placeholder="Username">
    <input id="login-password" type="password" placeholder="Password">
    <button onclick="login()">enter</button>

    <hr>

    <h2>Створення товару</h2>
    <input id="prod-name" placeholder="Назва товару">
    <input id="prod-description" placeholder="Опис товару">
    <input id="prod-price" placeholder="Ціна" type="number" step="0.01">
    <input id="prod-category" placeholder="ID категорії" type="number">
    <input id="prod-stock" placeholder="Кількість" type="number">
    <input type="file" id="prod-image" accept="image/*">
    <button onclick="createProduct()">Створити товар</button>

    <h2>Список товарів</h2>
    <button onclick="listProducts()">Отримати список товарів</button>

    <hr>

    <h3>Результат:</h3>
    <pre id="output">server answer</pre>

    <script>
        const AUTH_URL = "http://127.0.0.1:8000/api/auth";
        const CATALOG_URL = "http://127.0.0.1:8000/api/catalog";

        function showResult(status, data) {
            document.getElementById('output').textContent =
                `Статус: ${status}\n` + JSON.stringify(data, null, 2);
        }

        async function register() {
            const data = {
                username: document.getElementById('reg-username').value,
                email: document.getElementById('reg-email').value,
                password: document.getElementById('reg-password').value,
                password2: document.getElementById('reg-password2').value,
            };

            const response = await fetch(`${AUTH_URL}/register/`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data),
            });

            const result = await response.json();
            showResult(response.status, result);
        }

        async function login() {
            const data = {
                username: document.getElementById('login-username').value,
                password: document.getElementById('login-password').value,
            };

            const response = await fetch(`${AUTH_URL}/login/`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify(data),
            });

            const result = await response.json();
            showResult(response.status, result);
        }

        async function createProduct() {
            const formData = new FormData();
            formData.append('name', document.getElementById('prod-name').value);
            formData.append('description', document.getElementById('prod-description').value);
            formData.append('price', document.getElementById('prod-price').value);
            formData.append('category', document.getElementById('prod-category').value);
            formData.append('stock', document.getElementById('prod-stock').value);

            const fileInput = document.getElementById('prod-image');
            if (fileInput.files[0]) {
                formData.append('image', fileInput.files[0]);
            }

            // ВАЖНО: не указываем Content-Type вручную — браузер сам
            // подставит правильный multipart/form-data с нужным boundary
            const response = await fetch(`${CATALOG_URL}/products/`, {
                method: "POST",
                credentials: "include",
                body: formData,
            });

            const result = await response.json();
            showResult(response.status, result);
        }

        async function listProducts() {
            const response = await fetch(`${CATALOG_URL}/products/`, {
                method: "GET",
                credentials: "include",
            });

            const result = await response.json();
            showResult(response.status, result);
        }
    </script>

</body>

</html>
